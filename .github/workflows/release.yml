name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    # Uploads install.sh on every tag so `/releases/latest/download/install.sh`
    # resolves even if the plugin build fails.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Publish install.sh
        uses: softprops/action-gh-release@v2
        with:
          files: install.sh
          generate_release_notes: true

  build:
    needs: installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Stage release tree
        run: |
          set -eu
          OUT="$(mktemp -d)"
          # Flatten into OUT so the tarball has no wrapper directory —
          # extracting it drops files directly into the current dir.
          tar cf - \
            --exclude=node_modules --exclude=.git --exclude=.github \
            --exclude=__pycache__ --exclude='*.tar.gz' \
            . | tar xf - -C "$OUT"
          tar -czf rom-injector.tar.gz -C "$OUT" .
          sha256sum rom-injector.tar.gz > rom-injector.tar.gz.sha256

      - name: Publish tarball
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rom-injector.tar.gz
            rom-injector.tar.gz.sha256
