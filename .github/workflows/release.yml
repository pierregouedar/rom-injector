name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Publish install.sh
        uses: softprops/action-gh-release@v2
        with:
          files: install.sh
          generate_release_notes: true

  build:
    needs: installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Package release zip
        run: |
          set -eu
          # Flat zip: extracting it dumps files into the target dir
          # with no wrapper. Match the allycenter/decky convention.
          VERSION="${GITHUB_REF_NAME}"
          ZIP="rom-injector-${VERSION}.zip"
          zip -r "$ZIP" \
            dist main.py config.py scanner.py sgdb.py logs.py \
            plugin.json package.json LICENSE README.md \
            -x "*.DS_Store" "*.map"
          # Also emit a stable filename so /releases/latest/download/rom-injector.zip resolves.
          cp "$ZIP" rom-injector.zip
          sha256sum "$ZIP" rom-injector.zip > checksums.txt

      - name: Publish zip
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rom-injector-*.zip
            rom-injector.zip
            checksums.txt
